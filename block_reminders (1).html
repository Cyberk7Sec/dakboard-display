<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#161e1a;--gold:#C5A059;--gold-d:rgba(197,160,89,0.5);
  --cream:#E8DFC8;--cream-x:rgba(232,223,200,0.22);--sage:#6a9e82;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100vw;height:100vh;background:var(--bg);overflow:hidden;font-family:'JetBrains Mono',monospace;}
.wrap{
  width:100%;height:100%;
  display:flex;flex-direction:column;gap:18px;
  padding:20px 22px;
  background:#1B2621;
  border:0.5px solid rgba(197,160,89,0.25);
  border-radius:8px;position:relative;overflow:hidden;
}
.wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(197,160,89,0.25);}
.hdr{display:flex;align-items:center;gap:16px;font-size:30px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-d);flex-shrink:0;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--sage);animation:pulse 2s infinite;flex-shrink:0;}
.notes{display:flex;flex-direction:column;gap:16px;flex:1;overflow:hidden;}
.note{
  padding:18px 22px 8px 14px;
  background:rgba(197,160,89,0.1);
  border:0.5px solid rgba(197,160,89,0.35);
  border-left:3px solid var(--gold);
  border-radius:0 7px 7px 0;
  animation:fadeUp 0.4s ease both;
  position:relative;
}
.note-text{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:500;
  color:var(--cream);
  line-height:1.4;
  letter-spacing:0.01em;
}
.note-glow{
  position:absolute;inset:0;
  border-radius:0 7px 7px 0;
  box-shadow:inset 0 0 20px rgba(197,160,89,0.06);
  pointer-events:none;
}
.empty{
  font-size:28px;color:var(--cream-x);font-style:italic;
  display:flex;align-items:center;justify-content:center;flex:1;
  font-family:'Playfair Display',serif;
}
.src{font-size:30px;letter-spacing:0.1em;text-transform:uppercase;color:var(--cream-x);flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><div class="pulse"></div>R E M I N D E R S</div>
  <div class="notes" id="notes">
    <div class="empty">No reminders today</div>
  </div>
  <div class="src">via zapier · facebook messenger</div>
</div>
<script>
const SHEET_URL='YOUR_APPS_SCRIPT_URL_HERE';
function render(notes){
  const el=document.getElementById('notes');
  const active=notes.filter(n=>n&&n.trim());
  if(!active.length){el.innerHTML='<div class="empty">No reminders today</div>';return;}
  el.innerHTML=active.map((n,i)=>`
    <div class="note" style="animation-delay:${i*0.08}s">
      <div class="note-text">${n}</div>
      <div class="note-glow"></div>
    </div>`).join('');
}
function fetchData(){
  if(SHEET_URL==='YOUR_APPS_SCRIPT_URL_HERE'){render(['Check Status of Request — Apartment','Nejaun: call back client re: boots pickup']);return;}
  fetch(SHEET_URL).then(r=>r.json()).then(data=>{
    render(data.REMINDER?Object.values(data.REMINDER):[]);
  }).catch(()=>render([]));
}
fetchData();setInterval(fetchData,60000);
</script>
</body>
</html>
